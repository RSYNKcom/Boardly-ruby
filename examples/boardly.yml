# ─────────────────────────────────────────────────────────────────────────────
# Boardly — worked example workflow
#
# Save as .github/workflows/boardly.yml in the repo that holds your config.
# It pairs with the example config in ./project-automation.yml.
#
# Cadence below: every weekday morning at 08:00 UTC, plus a manual "Run workflow"
# button. Adjust the cron to taste — Boardly is idempotent and de-dupes, so
# running it more often is safe.
# ─────────────────────────────────────────────────────────────────────────────
name: Project automation

on:
  workflow_dispatch:          # manual run from the Actions tab
  schedule:
    - cron: "0 8 * * 1-5"     # 08:00 UTC, Mon–Fri

permissions:
  contents: read
  issues: write               # needed to comment / open standup + digest issues

# Don't let two runs stomp each other if a scheduled run overlaps a manual one.
concurrency:
  group: boardly
  cancel-in-progress: false

jobs:
  automate:
    runs-on: ubuntu-latest    # required — Boardly (Ruby) is a Docker container action, Linux only
    steps:
      - uses: cdrrazan/Boardly-ruby@v1
        with:
          token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}   # fine-grained PAT: Projects RW + Issues RW
          config-path: .github/project-automation.yml
          # only: stale-nudge   # uncomment to run a single feature
          dry-run: "false"      # set "true" to preview actions without changing anything
        env:
          # Secrets referenced by name in the config's notifications block.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
