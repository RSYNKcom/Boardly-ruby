<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#141a2a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d8bff"/>
      <stop offset="0.5" stop-color="#a77bff"/>
      <stop offset="1" stop-color="#37e0c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="10%" r="70%">
      <stop offset="0" stop-color="#6d8bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6d8bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo mark -->
  <rect x="96" y="96" width="96" height="96" rx="22" fill="url(#brand)"/>
  <g fill="#0b0d12">
    <rect x="118" y="120" width="15" height="48" rx="4"/>
    <rect x="137" y="120" width="15" height="30" rx="4"/>
    <rect x="156" y="120" width="15" height="38" rx="4"/>
  </g>

  <text x="212" y="168" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#e8ecf5">Boardly</text>

  <text x="96" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#e8ecf5">Put your GitHub Projects</text>
  <text x="96" y="416" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="url(#brand)">board on autopilot.</text>

  <text x="96" y="486" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#9aa6bf">Sprint rollover · stale nudges · digests · standups · priority sort · Slack &amp; email</text>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600">
    <rect x="96" y="524" width="234" height="52" rx="26" fill="url(#brand)"/>
    <text x="213" y="558" fill="#0b0d12" text-anchor="middle">Open source · MIT</text>
    <text x="360" y="558" fill="#6b768f">github.com/cdrrazan/Boardly</text>
  </g>
</svg>
